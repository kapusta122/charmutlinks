<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкант — Портфолио</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1 {
            color: #fff;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }
        .subtitle {
            color: #a0a0a0;
            font-size: 1.1rem;
            margin-bottom: 50px;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }
        /* Контейнер для кнопок — равномерное расстояние */
        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            max-width: 900px;
        }
        /* Базовые стили для всех кнопок */
        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* Плавная анимация: увеличена длительность и добавлен cubic-bezier */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        /* Кнопка "Обо мне" — полупрозрачная с бордером */
        .btn-about {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .btn-about:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }
        /* Кнопка "Музыка" — градиентная */
        .btn-music {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-music:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }
        /* Кнопка "Контакты" — зелёная */
        .btn-contact {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        .btn-contact:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(17, 153, 142, 0.4);
        }
        /* НОВАЯ кнопка "Buy my beats" — акцентная с анимацией пульсации */
        .btn-buy {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            animation: pulse-glow 2s ease-in-out infinite;
        }
        .btn-buy:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 20px 50px rgba(245, 87, 108, 0.5);
            animation: none;
        }
        /* Эффект свечения для кнопки покупки */
        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(240, 147, 251, 0.4), 0 0 40px rgba(245, 87, 108, 0.2);
            }
            50% {
                box-shadow: 0 0 30px rgba(240, 147, 251, 0.6), 0 0 60px rgba(245, 87, 108, 0.4);
            }
        }
        /* Эффект блика при наведении на все кнопки */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.7s ease;
        }
        .btn:hover::before {
            left: 100%;
        }
        /* Активное состояние — нажатие */
        .btn:active {
            transform: translateY(-1px) scale(0.98);
            transition: all 0.1s ease;
        }
        /* Адаптивность */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .btn {
                padding: 14px 30px;
                font-size: 14px;
            }
            .buttons-container {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>Мои треки</h1>
    <p class="subtitle">Создаю биты в стилях Lo-Fi, Hip-Hop и Synthwave. Каждый трек — это история, которую я хочу рассказать.</p>
    <div class="buttons-container">
        <a href="#about" class="btn btn-about">Обо мне</a>
        <a href="#music" class="btn btn-music">Музыка</a>
        <a href="#buy" class="btn btn-buy">Buy my beats</a>
        <a href="#contact" class="btn btn-contact">Контакты</a>
    </div>
</body>
</html>
