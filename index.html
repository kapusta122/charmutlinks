    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            padding: 20px;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        /* Фоновая картинка с размытием */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('hatt.png');
            background-size: cover;
            background-position: center;
            background-attachment: scroll;
            opacity: 0.5;
            filter: brightness(0.7);
            z-index: -1;
        }
        /* Затемнение фона при анимации карточки */
        .dark-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 98;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), visibility 0.6s;
        }
        .dark-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .profile-img-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            perspective: 1000px;
            z-index: 100;
            width: 180px;
            height: 180px;
        }
        .profile-card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            z-index: 100;
        }
        .profile-card.flipped {
            transform: rotateY(180deg) scale(1.25);
        }
        .profile-front, .profile-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            border: 2px solid #444;
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.8),
                0 10px 25px rgba(0, 0, 0, 0.6),
                0 5px 15px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .profile-front {
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .profile-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .profile-card:hover .profile-front img {
            transform: scale(1.08);
        }
        .profile-back {
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #ffffff;
            text-align: center;
        }
        .profile-back h3 {
            margin: 0 0 12px 0;
            font-size: 18px;
            color: #EE7700;
            font-weight: bold;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .profile-card.flipped .profile-back h3 {
            transform: scale(1.1);
            color: #ff8c00;
        }
        .profile-back p {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            color: #b0b0b0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .profile-card.flipped .profile-back p {
            transform: scale(1.05);
            color: #c0c0c0;
        }
        /* Дополнительная тень для глубины */
        .profile-img-container::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: -12px;
            bottom: -12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            z-index: -1;
            filter: blur(12px);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: calc(100% + 24px);
            height: calc(100% + 24px);
            transform: translateX(-12px);
        }
        .profile-card.flipped ~ ::after {
            transform: scale(1.25) translateX(-12px);
        }

            align-items: center;
            width: 100%;

        h1 {

            display: flex;
            align-items: center;

            gap: 10px;

        }
        .link-background {
            position: absolute;
            bottom: -6px;

            border-radius: 4px;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease, bottom 0.3s ease;
        }
        .link-container:hover .link-background {
            opacity: 1;
            bottom: -8px;
        }
        .link-container:hover .link {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 20px rgba(238, 119, 0, 0.15);
        }

            transition: max-height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        margin-top 0.5s ease,
                        opacity 0.4s ease;
            opacity: 0;
        }
